# @package metrics
device: auto
use_roi: true
train: []
inference:
  - _target_: src.metrics.ImageMetrics
    use_roi: ${metrics.use_roi}
    metric:
      _target_: torchmetrics.image.PeakSignalNoiseRatio
      data_range: 1.0
    device: ${metrics.device}
    name: PSNR
  - _target_: src.metrics.ImageMetrics
    use_roi: ${metrics.use_roi}
    metric:
      _target_: torchmetrics.image.StructuralSimilarityIndexMeasure
      data_range: 1.0
    device: ${metrics.device}
    name: SSIM
  - _target_: src.metrics.ImageMetrics
    use_roi: ${metrics.use_roi}
    metric:
      _target_: torchmetrics.regression.MeanSquaredError
    device: ${metrics.device}
    name: MSE
