# @package model
# Pre_4 + LeADMM5 + Post_4
_target_: src.model.modular_admm.ModularADMM

admm_core:
  _target_: src.model.unrolled_admm.UnrolledADMM
  num_iters: 5
  init_mu: 1e-4
  init_tau: 2e-4
  eps: 1e-6
  cg_iters: 10
  clamp_output: false

pre_processor:
  _target_: src.model.drunet.DRUNetProcessor
  channels: 3
  features: [40, 80, 160, 320]
  residual_scale: 0.1
  clamp_output: false

post_processor:
  _target_: src.model.drunet.DRUNetProcessor
  channels: 3
  features: [40, 80, 160, 320]
  residual_scale: 0.1
  clamp_output: false
